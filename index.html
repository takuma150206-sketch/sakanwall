<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>左官MR練習 - 平壁（v5.6 道場・PC対応）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script>
  AFRAME.registerComponent('blade-shape',{
    init:function(){
      const hw=0.042,RECT=0.200,TOTAL=0.240,D=0.0025;
      const bot=-TOTAL/2,rTop=bot+RECT,tip=bot+TOTAL;
      const sh=new THREE.Shape();
      sh.moveTo(-hw,bot);sh.lineTo(hw,bot);sh.lineTo(hw,rTop);sh.lineTo(0,tip);sh.lineTo(-hw,rTop);sh.closePath();
      const geo=new THREE.ExtrudeGeometry(sh,{depth:D,bevelEnabled:false});
      geo.translate(0,0,-D/2);
      this.el.setObject3D('mesh',new THREE.Mesh(geo,
        new THREE.MeshStandardMaterial({color:0xc4c6ca,metalness:0.90,roughness:0.14,side:THREE.DoubleSide})));
    }
  });
  AFRAME.registerComponent('trowel',{
    init:function(){
      this.lastTick=0;this.wasContact=false;this.mouseDown=false;
      this.heq=null;this.hma=0;this.kgd=false;
      this._lp=new THREE.Vector3();this.spd=0;
      this._wasHadMortar=false;   /* ② mortar-just-ran-out haptic 用 */
      this.rc=new THREE.Raycaster();this.rc.far=0.08;
      const Y0=-0.085,Y1=+0.115,BZ=-0.042;
      this.bpts=[];
      for(let i=0;i<9;i++) this.bpts.push(new THREE.Vector3(0,Y0+i/8*(Y1-Y0),BZ));
      this._wp=new THREE.Vector3();this._fwd=new THREE.Vector3();
      this._tp=new THREE.Vector3();this._hp=new THREE.Vector3();this._bc=new THREE.Vector3();
      this.el.addEventListener('abuttondown',()=>{
        const o=this.el.object3D;if(!o)return;
        o.getWorldPosition(this._tp);
        placeWalls(this._tp.x, this._tp.z);
        painters.forEach(p=>resetPainter(p));
        setMsg('壁を設置');
      });
      document.getElementById('leftHand').addEventListener('gripdown',()=>{
        hawkMortar=100;updMortar();setMsg('鏝板補充');
      });
      window.addEventListener('mousedown',(e)=>{if(e.button===0)this.mouseDown=true;});
      window.addEventListener('mouseup',  (e)=>{if(e.button===0)this.mouseDown=false;});
      /* PC 用キーボード: Space=コテ返し, R=鏝板補充, Q=壁設置, T=リセット。XR中は無効 */
      window.addEventListener('keydown',(e)=>{
        const sc=document.querySelector('a-scene');
        if(sc&&(sc.is('vr-mode')||sc.is('ar-mode')))return;
        if(e.code==='Space'){
          e.preventDefault();
          if(hawkMortar>0){
            const amt=Math.min(50,hawkMortar);
            hawkMortar=Math.max(0,hawkMortar-amt);
            trowelMortar=Math.min(78,trowelMortar+amt);
            this.kgd=true;
            updMortar();setMsg('コテ返し');snd.playKG();
          }
        }else if(e.code==='KeyR'){
          hawkMortar=100;updMortar();setMsg('鏝板補充');
        }else if(e.code==='KeyQ'){
          /* 壁設置: 現在のカメラワールド XZ 位置基準 */
          const camEl=document.getElementById('cam');
          if(camEl){
            const wp=new THREE.Vector3();
            camEl.object3D.getWorldPosition(wp);
            placeWalls(wp.x,wp.z);
          }else{
            placeWalls(0,0);
          }
          painters.forEach(p=>resetPainter(p));
          setMsg('壁を設置');
        }else if(e.code==='KeyT'){
          painters.forEach(p=>resetPainter(p));setMsg('白紙に戻す');
        }
      });
    },
    tick:function(){
      const now=performance.now();
      if(now-this.lastTick<16)return;this.lastTick=now;
      window._contactActive=false;   /* ④ 角度指標: 各tick冒頭でリセット、実際に塗る時のみtrue */
      const sc=document.querySelector('a-scene');
      const isXR=sc.is('vr-mode')||sc.is('ar-mode');
      const o=this.el.object3D;if(!o)return;
      const cp=new THREE.Vector3();o.getWorldPosition(cp);
      this.spd=cp.distanceTo(this._lp)*60*100;this._lp.copy(cp);
      if(isXR){try{const s=sc.renderer?.xr?.getSession?.();
        if(s?.inputSources)for(const src of s.inputSources)
          if(src.handedness==='right'&&src.gamepad?.hapticActuators?.length){window._rgp=src.gamepad;break;}
      }catch(e){}}
      /* コテ返し */
      const lh=document.getElementById('leftHand');
      if(lh?.object3D){
        this._hp.set(0,0.012,-0.15).applyMatrix4(lh.object3D.matrixWorld);
        this._bc.set(0,0.015,-0.042).applyMatrix4(o.matrixWorld);
        if(this._bc.distanceTo(this._hp)<0.22){
          if(!this.heq){this.heq=o.quaternion.clone();this.hma=0;if(hawkMortar>0)setMsg('手首をひねれ');}
          this.hma=Math.max(this.hma,o.quaternion.angleTo(this.heq));
          if(this.hma>Math.PI*0.22&&hawkMortar>0){
            const amt=Math.min(50,hawkMortar);hawkMortar=Math.max(0,hawkMortar-amt);
            trowelMortar=Math.min(78,trowelMortar+amt);
            this.kgd=true;this.heq=null;this.hma=0;
            updMortar();setMsg('コテ返し');haptic(0.55,150);snd.playKG();
          }
        }else{this.heq=null;this.hma=0;}
      }
      /* PC モード: コテをカメラ位置の右下前方に追従、視線方向 + 15° 下tiltで角度が塗り適正になるように */
      if(!isXR){
        const camEl=document.getElementById('cam');
        if(camEl){
          const camObj=camEl.object3D;
          const camWorldPos=new THREE.Vector3();camObj.getWorldPosition(camWorldPos);
          const camWorldQuat=new THREE.Quaternion();camObj.getWorldQuaternion(camWorldQuat);
          /* 右下前方オフセット: 右0.18, 下0.20, 前0.35 */
          const offset=new THREE.Vector3(0.18,-0.20,-0.35);
          offset.applyQuaternion(camWorldQuat);
          o.position.copy(camWorldPos).add(offset);
          o.quaternion.copy(camWorldQuat);
          o.rotateX(0.26);  /* デフォルトで約15°下tilt → tiltDegが最初から塗り適正の範囲に */
          o.updateMatrixWorld(true);
        }
      }
      if(!isXR&&!this.mouseDown){lastUV=null;this.wasContact=false;return;}
      this._fwd.set(0,0,-1).transformDirection(o.matrixWorld);
      const WIDS=['wallMain'];
      let hitEl=null,hitIdx=0;
      for(let i=0;i<WIDS.length;i++){
        const el=document.getElementById(WIDS[i]);if(!el)continue;
        const mesh=el.getObject3D('mesh');if(!mesh)continue;
        this._wp.copy(this.bpts[4]).applyMatrix4(o.matrixWorld);
        this.rc.set(this._wp,this._fwd);
        if(this.rc.intersectObject(mesh,true).length){hitEl=el;hitIdx=i;break;}
      }
      if(!hitEl){
        if(this.wasContact)snd.stop();
        lastUV=null;this.wasContact=false;return;
      }
      const wm=hitEl.getObject3D('mesh');
      const uvs=[];
      for(const lp of this.bpts){
        this._wp.copy(lp).applyMatrix4(o.matrixWorld);
        this.rc.set(this._wp,this._fwd);
        const h=this.rc.intersectObject(wm,true);
        if(h.length&&h[0].uv)uvs.push({x:h[0].uv.x,y:h[0].uv.y});
      }
      if(uvs.length<2){lastUV=null;this.wasContact=false;return;}
      /* ③ mode-aware sound + ② rich haptics */
      let mode;
      if(trowelMortar<=0) mode='smooth';
      else if(!this.kgd){
        setMsg('材料を取れ');
        if(this.wasContact){snd.stop();this.wasContact=false;}
        return;
      }
      else mode='paint';
      if(!this.wasContact){haptic(0.65,55);snd.start(this.spd,mode);this.wasContact=true;}
      else snd.upd(this.spd,mode);
      const p=painters[hitIdx];
      const spdF=Math.max(0,Math.min(1,this.spd/15));
      /* ④ コテの角度判定: blade の -Z (this._fwd) と壁面法線 (0,0,1) の角度で塗り品質を変化
         10〜25° の範囲で最大品質、平らすぎ／立ちすぎで塗り係数を落とし、触覚も控えめに */
      const tiltCos=Math.max(-1,Math.min(1,-this._fwd.z));  /* 1=blade垂直に押し当て, cos(15°)≒0.966=適正 */
      const tiltDeg=Math.acos(tiltCos)*180/Math.PI;
      let angleFactor;
      if(tiltDeg<5)       angleFactor=0.4;   /* 平らすぎて材料が伸びない */
      else if(tiltDeg<10) angleFactor=0.7;   /* やや浅い */
      else if(tiltDeg<=25)angleFactor=1.0;   /* 適正な塗り角度 */
      else if(tiltDeg<=35)angleFactor=0.7;   /* やや深い */
      else                angleFactor=0.4;   /* 立ちすぎ、削れる */
      window._angleDeg=tiltDeg;
      window._angleFactor=angleFactor;
      window._contactActive=true;
      if(mode==='smooth'){
        smoothSurface(p,uvs);
        /* 均し: 乾いた抵抗感、速度で強度が変わる */
        haptic(0.08+spdF*0.15, 20+Math.round((1-spdF)*15));
      }else{
        paintSurface(p,uvs,angleFactor);
        /* 塗り: モルタル量と速度で強度・パルス長が変わる。角度適正なら触覚+15%で「気持ちよさ」を明示 */
        const mortarF = 0.12 + 0.25 * (trowelMortar/TMAX);
        haptic(mortarF*(angleFactor>=0.95?1.15:1.0), Math.round(35 - spdF*15));
      }
      /* ② モルタルが今このtickで0になった瞬間の「カリッ」 */
      if(trowelMortar===0 && this._wasHadMortar){
        haptic(0.55, 80);
      }
      this._wasHadMortar = trowelMortar > 0;
      requestHUD();
    }
  });
  </script>
  <style>
    body{margin:0;font-family:-apple-system,sans-serif;}
    #info{position:fixed;top:12px;left:12px;background:rgba(0,0,0,0.65);color:#fff;
      padding:10px 14px;border-radius:8px;font-size:12px;line-height:1.7;z-index:100;max-width:260px;}
    #ver{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.5);color:#aaa;
      padding:4px 10px;border-radius:6px;font-size:11px;z-index:100;}
    #btn{position:fixed;bottom:24px;right:24px;padding:18px 36px;font-size:18px;
      background:#555;color:#fff;border:none;border-radius:10px;cursor:pointer;z-index:100;font-weight:bold;}
    #btn:hover:not(:disabled){background:#777;}#btn:disabled{background:#444;cursor:not-allowed;}
    #st{position:fixed;bottom:24px;left:24px;background:rgba(0,0,0,0.7);color:#fff;
      padding:8px 12px;border-radius:6px;font-size:12px;z-index:100;}
  </style>
</head>
<body>
  <div id="ver">v5.6 道場 (PC対応)</div>
  <div id="info">
    <strong>左官MR練習 - 平壁 (道場)</strong><br>
    塗代ガイド 5mm／最大塗り厚 10mm<br>
    得点基準: 5mm = 100点<br>
    ①艶 ②触覚 ③音 ④角度 ⑤盛り<br>
    <br>
    <strong>PC操作:</strong><br>
    WASD: 移動 / マウス左Drag: 見る＆塗る<br>
    Space: コテ返し / R: 鏝板補充<br>
    Q: 壁を設置 / T: リセット
  </div>
  <button id="btn" disabled>確認中...</button>
  <div id="st">確認中...</div>
  <a-scene background="transparent:true" vr-mode-ui="enabled:false"
           webxr="optionalFeatures:hit-test,local-floor,anchors;"
           renderer="colorManagement:true;antialias:true;alpha:true;">
    <a-assets>
      <canvas id="c0" width="512" height="512"></canvas>
      <canvas id="h0" width="128" height="128"></canvas>
      <canvas id="rh0" width="128" height="128"></canvas>
      <canvas id="opsCvs" width="512" height="512"></canvas>
      <canvas id="hudCvs" width="384" height="560"></canvas>
    </a-assets>
    <!-- メイン壁: base roughness=1.0, metalness=0.05（湿り感のために metalness を少し盛る） -->
    <a-entity id="wallMain"
      geometry="primitive:plane;width:1.2;height:1.0;segmentsWidth:48;segmentsHeight:40"
      material="shader:standard;roughness:1.0;metalness:0.05;"
      position="0 1.3 -0.70"></a-entity>
    <!-- 塗代ガイド（5mm×5mm 角材, 4辺） -->
    <a-box id="guideT" position="0 1.8025 -0.6975"    width="1.210" height="0.005" depth="0.005" color="#A0825C" material="roughness:0.85;"></a-box>
    <a-box id="guideB" position="0 0.7975 -0.6975"    width="1.210" height="0.005" depth="0.005" color="#A0825C" material="roughness:0.85;"></a-box>
    <a-box id="guideL" position="-0.6025 1.3 -0.6975" width="0.005" height="1.000" depth="0.005" color="#A0825C" material="roughness:0.85;"></a-box>
    <a-box id="guideR" position=" 0.6025 1.3 -0.6975" width="0.005" height="1.000" depth="0.005" color="#A0825C" material="roughness:0.85;"></a-box>
    <!-- HUD (道場・巻物風) -->
    <a-plane id="hudPanel" width="0.46" height="0.68" position="-1.0 1.84 -0.55" rotation="0 35 0"
             material="shader:flat;color:#fff;"></a-plane>
    <!-- リセットボタン -->
    <a-entity position="-1.0 1.36 -0.55" rotation="0 35 0">
      <a-box id="resetBtn" width="0.38" height="0.12" depth="0.04" color="#a44"></a-box>
      <a-text value="リセット" position="0 0 0.03" align="center" color="#fff" width="1.5"></a-text>
    </a-entity>
    <!-- 操作説明 -->
    <a-plane width="0.68" height="0.55" position="0.95 1.65 -0.60" rotation="0 -30 0"
             material="src:#opsCvs;transparent:true;shader:flat;"></a-plane>
    <!-- 右手 -->
    <a-entity id="rightHand" oculus-touch-controls="hand:right;model:false" trowel>
      <a-sphere position="0 -0.080 0" radius="0.018" color="#C4A068" material="roughness:0.75;"></a-sphere>
      <a-cylinder position="0 -0.0175 0" radius="0.015" height="0.125" color="#D8BC84" material="roughness:0.70;"></a-cylinder>
      <a-cylinder position="0 0.045 0" radius="0.013" height="0.008" color="#7A7A7A" material="metalness:0.7;roughness:0.4;"></a-cylinder>
      <a-cylinder position="0 0 -0.020" radius="0.007" height="0.040" rotation="90 0 0" color="#888" material="metalness:0.80;roughness:0.28;"></a-cylinder>
      <a-entity blade-shape position="0 0.035 -0.042"></a-entity>
      <!-- ⑤ 鏝面のモルタル: 鏝の左側(x=-0.020)に、先端-末端(y=-0.085〜0.115 の rectangular 部分の中心 y=0.015 に配置)まで細長い1本の ellipsoid で表現。従来の tMV/tRidge/tLumps は廃止 -->
      <a-sphere id="tMortar" position="-0.020 0.015 -0.052" radius="0.012" scale="0.1 0.1 0.1" color="#857f78" material="roughness:0.85;metalness:0;transparent:true;opacity:0;"></a-sphere>
    </a-entity>
    <!-- 左手 -->
    <a-entity id="leftHand" laser-controls="hand:left"
              raycaster="objects:#resetBtn;far:3;lineColor:#fff;lineOpacity:0.4">
      <a-box position="0 0.005 -0.15" width="0.30" height="0.007" depth="0.30" color="#A08860" material="roughness:0.85;"></a-box>
      <a-cylinder position="0 -0.065 -0.15" radius="0.016" height="0.12" color="#6B4226" material="roughness:0.80;"></a-cylinder>
      <a-sphere id="hMV" position="0 0.022 -0.15" scale="0.22 0.05 0.22" color="#828278" material="roughness:0.9;"></a-sphere>
    </a-entity>
    <!-- PC 用カメラ: rig で WASD 移動、camera で look-controls。XR中は自動無効 -->
    <a-entity id="rig" position="0 0 0.5" wasd-controls="acceleration:20;fly:false">
      <a-entity id="cam" camera position="0 1.6 0" look-controls="pointerLockEnabled:false;reverseMouseDrag:false"></a-entity>
    </a-entity>
    <a-light type="ambient" intensity="0.60"></a-light>
    <a-light type="directional" intensity="1.20" position="1 2 1"></a-light>
    <a-light type="directional" intensity="0.35" position="-1 1 0.5" color="#c8d8ff"></a-light>
  </a-scene>
  <script>
  /* WebXR */
  const stEl=document.getElementById('st'),btnEl=document.getElementById('btn'),sc=document.querySelector('a-scene');
  let arOK=false;
  (async()=>{
    if(!navigator.xr){stEl.textContent='✗ 非対応';return;}
    try{
      arOK=await navigator.xr.isSessionSupported('immersive-ar');
      const vr=await navigator.xr.isSessionSupported('immersive-vr');
      if(arOK){stEl.textContent='✓ AR対応';btnEl.textContent='Enter AR (MR)';btnEl.disabled=false;}
      else if(vr){stEl.textContent='⚠ VRのみ';btnEl.textContent='Enter VR';btnEl.disabled=false;}
      else stEl.textContent='✗ 非対応';
    }catch(e){stEl.textContent='エラー';}
  })();
  const UI=['btn','st','info','ver'];
  btnEl.addEventListener('click',()=>{snd.init();arOK?sc.enterAR():sc.enterVR();});
  sc.addEventListener('enter-vr',()=>UI.forEach(id=>document.getElementById(id).style.display='none'));
  sc.addEventListener('exit-vr', ()=>UI.forEach(id=>document.getElementById(id).style.display='block'));
  /* ハプティクス */
  window._rgp=null;
  function haptic(i,ms){try{window._rgp?.hapticActuators?.[0]?.pulse(i,ms);}catch(e){}}
  /* モルタル状態 */
  let hawkMortar=100,trowelMortar=0,lastUV=null;
  const TMAX=60,PCOST=0.35;
  let hudMsg='',msgT=null,bestScore=0;
  function setMsg(m){hudMsg=m;requestHUD();clearTimeout(msgT);msgT=setTimeout(()=>{hudMsg='';requestHUD();},4000);}
  function updMortar(){
    const hv=document.getElementById('hMV');
    if(hv){const r=Math.max(0.02,hawkMortar/100);hv.setAttribute('scale',`${r*0.22} ${r*0.05} ${r*0.22}`);}
    const r=trowelMortar/TMAX;
    /* ⑤ 鏝面のモルタル: 鏝の左側先端-末端に細長い1本の ellipsoid
       radius=0.012 の base sphere が満載時に 幅24mm × 長さ204mm × 盛り高さ13mm の細長カマボコに */
    const rp=Math.pow(r,0.7);
    const opac=(Math.min(1,r*1.1)*0.9).toFixed(2);
    const sxW=(0.15+rp*0.85).toFixed(3);  /* 幅 X: 0.15→1.0 */
    const syL=(0.30+rp*8.20).toFixed(3);  /* 長さ Y: 0.30→8.5 → 先端-末端 */
    const szD=(0.10+rp*0.45).toFixed(3);  /* 盛り高さ Z: 0.10→0.55 */
    const mEl=document.getElementById('tMortar');
    if(mEl){
      mEl.setAttribute('scale',`${sxW} ${syL} ${szD}`);
      mEl.setAttribute('material',`color:#857f78;roughness:0.85;metalness:0;opacity:${opac};transparent:true`);
    }
    requestHUD();
  }
  /* ③ サウンド: 塗り(wet)と均し(dry)の2モード
     paint: 湿った低め「シャー…」、bandpass 中心低め+lowpass 補助
     smooth: 乾いた高め「ザラ…」、bandpass 中心高め+highpass 補助 */
  const snd={ctx:null,nb:null,nd:null,nd2:null,gn:null,fn:null,mode:null,
    init(){if(this.ctx)return;try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      const sr=this.ctx.sampleRate,b=this.ctx.createBuffer(1,sr,sr),d=b.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;this.nb=b;}catch(e){}},
    /* v5.4 tuning 7: 実物の左官コテ返し動画（youtube 参照）に寄せて、大幅に低域・湿った方向へシフト。
       - 高域ガリガリ寄りだったのを、中低域body重視に転換
       - playbackRate を 1.1-1.5 から 0.95-1.2 に落として粒を少しゆったり戻す
       - HP を大きく下げて body を復活 */
    _paintFreq(spd){return 2000+Math.min(spd,20)*80;},    /* 主層 lowpass 天井 (paint: 2000-3600 Hz) */
    _smoothFreq(spd){return 3500+Math.min(spd,20)*130;},  /* 主層 lowpass 天井 (smooth: 3500-6100 Hz) */
    start(spd,mode){if(!this.ctx||!this.nb)return;this.stop();
      this.mode=mode;
      const isPaint=mode==='paint';
      const now=this.ctx.currentTime;
      /* 主層: HP+LP の帯域通過、湿った body を残す */
      const s=this.ctx.createBufferSource();s.buffer=this.nb;s.loop=true;
      s.playbackRate.value=isPaint?0.95:1.2;
      this.fnHP=this.ctx.createBiquadFilter();this.fnHP.type='highpass';
      this.fnHP.frequency.value=isPaint?300:600;  /* HP を大きく下げて中低域body復活 */
      this.fn=this.ctx.createBiquadFilter();this.fn.type='lowpass';
      this.fn.frequency.value=isPaint?this._paintFreq(spd):this._smoothFreq(spd);
      /* grit層: 中域 bandpass 低Q + playbackRate ≈1 */
      const s2=this.ctx.createBufferSource();s2.buffer=this.nb;s2.loop=true;
      s2.playbackRate.value=isPaint?0.9:1.1;
      const sec=this.ctx.createBiquadFilter();sec.type='bandpass';
      sec.frequency.value=isPaint?1200:2500;
      sec.Q.value=3;
      const sg=this.ctx.createGain();sg.gain.value=isPaint?0.08:0.07;
      this.gn=this.ctx.createGain();this.gn.gain.setValueAtTime(0,now);

      s.connect(this.fnHP);this.fnHP.connect(this.fn);this.fn.connect(this.gn);

       ① 金属接触 → ② 擦り → ③ 湿ったモルタル持ち上げ（低域body復活）→ ④ 湿った中域 → ⑤ スロップ尾音 */

      s1.start(now);s1.stop(now+0.025);
      /* Phase 2 (20-80ms): 引き剥がす金属擦り音 - HP 1500 + LP 5000 の broadband、遅れて立ち上がる */
      const s2=this.ctx.createBufferSource();s2.buffer=this.nb;s2.playbackRate.value=1.3;
      const f2a=this.ctx.createBiquadFilter();f2a.type='highpass';f2a.frequency.value=1500;
      const f2b=this.ctx.createBiquadFilter();f2b.type='lowpass';f2b.frequency.value=5000;
      const g2=this.ctx.createGain();
      g2.gain.setValueAtTime(0,now);
      g2.gain.linearRampToValueAtTime(0.42,now+0.020);
      g2.gain.exponentialRampToValueAtTime(0.001,now+0.075);
      s2.connect(f2a);f2a.connect(f2b);f2b.connect(g2);g2.connect(dest);
      s2.start(now);s2.stop(now+0.080);
      /* Phase 3 (70-180ms): 湿ったモルタルが持ち上がる低域 body - LP 500Hz、後半に膨らむ */
      const s3=this.ctx.createBufferSource();s3.buffer=this.nb;s3.playbackRate.value=0.9;
      const f3=this.ctx.createBiquadFilter();f3.type='lowpass';f3.frequency.value=500;
      const g3=this.ctx.createGain();
      g3.gain.setValueAtTime(0,now);
      g3.gain.linearRampToValueAtTime(0.45,now+0.075);
      g3.gain.exponentialRampToValueAtTime(0.001,now+0.170);
      s3.connect(f3);f3.connect(g3);g3.connect(dest);
      s3.start(now);s3.stop(now+0.180);
      /* Phase 4 (65-155ms): 湿った中域のグルル - BP 700Hz Q=4、playbackRate 0.7 で粗い */
      const s4=this.ctx.createBufferSource();s4.buffer=this.nb;s4.playbackRate.value=0.7;

      g4.gain.setValueAtTime(0,now);
      g4.gain.linearRampToValueAtTime(0.30,now+0.070);
      g4.gain.exponentialRampToValueAtTime(0.001,now+0.150);
      s4.connect(f4);f4.connect(g4);g4.connect(dest);

      const f5=this.ctx.createBiquadFilter();f5.type='lowpass';f5.frequency.value=300;

      g5.gain.setValueAtTime(0,now);
      g5.gain.linearRampToValueAtTime(0.25,now+0.150);
      g5.gain.exponentialRampToValueAtTime(0.001,now+0.190);
      s5.connect(f5);f5.connect(g5);g5.connect(dest);
      s5.start(now);s5.stop(now+0.200);}
  };
  /* 壁・塗代ガイド配置 */

  function markDirty(p){if(p.colorTex)p.colorTex.needsUpdate=true;}
  function renderHt(p){
    const d=p.htImg.data;
    for(let i=0;i<p.heightData.length;i++){
      const v=Math.min(255,Math.floor(Math.max(0,p.heightData[i])/10*255));

  /* ① 湿り度 → roughness＋metalness テクスチャ更新（v5.4 強化版: レンジ大幅拡大＋metalnessMap 追加）
     緑ch: roughness  (wet=25 → 実効 0.10 でしっかりツヤ、dry=248 → 0.97 でしっかりマット)
     青ch: metalness  (wet=40 → 実効 0.16、dry=5 → 0.02) — わずかな金属感を足して反射を強化 */
  function renderRh(p){
    const d=p.rhImg.data;

      const w=Math.max(0,Math.min(1,p.wetnessData[i]));
      const green=Math.round(25+(1-w)*223);
      const blue =Math.round( 5+w*35);
      d[i*4]=0;d[i*4+1]=green;d[i*4+2]=blue;d[i*4+3]=255;

  /* 塗り */
  const MR=82,MG=80,MB=75;
  function paintSurface(p,uvs,angleFactor){
    if(uvs.length<2||trowelMortar<=0)return;
    angleFactor=angleFactor||1.0;   /* ④ 角度が適正なら 1.0、外れているほど 0.4 まで下がる */
    const ctx=p.ctx,W=p.W,H=p.H;
    const pts=uvs.map(u=>({x:u.x*W,y:(1-u.y)*H}));
    const f=pts[0],l=pts[pts.length-1],mid=pts[Math.floor(pts.length/2)],muv=uvs[Math.floor(uvs.length/2)];
    const bdx=l.x-f.x,bdy=l.y-f.y,ba=Math.atan2(bdy,bdx),hl=Math.sqrt(bdx*bdx+bdy*bdy)/2;
    let spd=0;
    if(p.lastUV){const dx=(muv.x-p.lastUV.x)*W,dy=-(muv.y-p.lastUV.y)*H;spd=Math.sqrt(dx*dx+dy*dy);}
    p.lastUV={x:muv.x,y:muv.y};
    const sf=(0.25+Math.random()*0.75)*(1-Math.max(0,Math.min(1,spd/18))*0.55)*angleFactor;
    const sw=26+Math.min(spd*1.2,14);
    const it=Math.min(1,trowelMortar/(TMAX*0.25));
    const cr=Math.round(MR-sf*18),cg=Math.round(MG-sf*16),cb=Math.round(MB-sf*14);
    for(const pt of pts){
      const a=(0.78*it*sf).toFixed(2);
      const g=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,sw);
      g.addColorStop(0,`rgba(${cr},${cg},${cb},${a})`);
      g.addColorStop(0.65,`rgba(${cr+8},${cg+6},${cb+4},${(a*0.65).toFixed(2)})`);
      g.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(pt.x,pt.y,sw,0,Math.PI*2);ctx.fill();
    }
    ctx.save();ctx.translate(mid.x,mid.y);ctx.rotate(ba);
    ctx.strokeStyle=`rgba(${MR+25},${MG+22},${MB+20},${(0.45*it*sf).toFixed(2)})`;
    ctx.lineWidth=1.4;
    [-1,1].forEach(s=>{ctx.beginPath();ctx.moveTo(-hl*0.92,s*sw*0.82);ctx.lineTo(hl*0.92,s*sw*0.82);ctx.stroke();});
    const num=Math.ceil((sw*2)/7)+1,STEPS=Math.max(20,Math.ceil(hl*2/5));
    for(let i=-Math.floor(num/2);i<=Math.floor(num/2);i++){
      const yo=i*7,ef=1-Math.abs(yo)/(sw*1.1);if(ef<=0)continue;
      const amp=Math.pow(Math.cos(Math.abs(yo)/sw*Math.PI*0.5),0.6)*4.2;
      const al=(0.40*ef*it*sf);
      ctx.strokeStyle=`rgba(${i%2===0?52:178},${i%2===0?49:172},${i%2===0?43:164},${al.toFixed(3)})`;
      ctx.lineWidth=0.7+1.6*Math.pow(ef,0.6);ctx.beginPath();
      for(let s=0;s<=STEPS;s++){
        const x=-hl+s*(hl*2/STEPS),w=Math.sin(x*0.055+i*1.1)*amp+Math.sin(x*0.132+i*0.7)*amp*0.28;
        s===0?ctx.moveTo(x,yo+w):ctx.lineTo(x,yo+w);

    }
    ctx.restore();
    for(let i=0;i<30;i++){
      const pt2=pts[Math.floor(Math.random()*pts.length)];
      const gx=pt2.x+(Math.random()-0.5)*sw*2.2,gy=pt2.y+(Math.random()-0.5)*sw*2.2;
      const v=Math.floor(60+Math.random()*40);
      ctx.fillStyle=`rgba(${v},${v-2},${v-4},${((0.28+Math.random()*0.45)*it*sf).toFixed(2)})`;
      ctx.beginPath();ctx.arc(gx,gy,Math.random()*2.5+0.4,0,Math.PI*2);ctx.fill();
    }
    markDirty(p);
    const rH=Math.round(p.HW*0.084/1.2*0.65);
    for(const uv of uvs){
      const cx=Math.floor(uv.x*p.HW),cy=Math.floor((1-uv.y)*p.HH);
      for(let y=Math.max(0,cy-rH);y<Math.min(p.HH,cy+rH+1);y+=2)
        for(let x=Math.max(0,cx-rH);x<Math.min(p.HW,cx+rH+1);x+=2){
          const d=Math.sqrt((x-cx)**2+(y-cy)**2);if(d>rH)continue;
          const ef=d<rH*0.75?1:1-(d-rH*0.75)/(rH*0.25);

    updMortar();
  }
  /* 均し */
  function smoothSurface(p,uvs){
    if(uvs.length<2)return;
    const ctx=p.ctx,W=p.W,H=p.H;
    const pts=uvs.map(u=>({x:u.x*W,y:(1-u.y)*H}));
    const f=pts[0],l=pts[pts.length-1],mid=pts[Math.floor(pts.length/2)];
    const bdx=l.x-f.x,bdy=l.y-f.y,ba=Math.atan2(bdy,bdx),hl=Math.sqrt(bdx*bdx+bdy*bdy)/2;
    const sw=36;
    const hasPaint=uvs.some(uv=>{
      const cx=Math.floor(uv.x*p.HW),cy=Math.floor((1-uv.y)*p.HH);
      return p.heightData[cy*p.HW+cx]>0.08;
    });
    if(!hasPaint)return;
    for(const pt of pts){
      const px=Math.floor(pt.x/W*p.HW),py=Math.floor(pt.y/H*p.HH);
      if(p.heightData[py*p.HW+px]<0.08)continue;
      const g=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,sw);
      g.addColorStop(0,'rgba(100,101,98,0.72)');g.addColorStop(0.5,'rgba(95,96,93,0.50)');g.addColorStop(1,'rgba(90,91,88,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(pt.x,pt.y,sw,0,Math.PI*2);ctx.fill();
    }
    ctx.save();ctx.translate(mid.x,mid.y);ctx.rotate(ba);
    const sh=ctx.createLinearGradient(-hl*0.8,0,hl*0.8,0);
    sh.addColorStop(0,'rgba(130,131,128,0)');sh.addColorStop(0.5,'rgba(135,136,133,0.25)');sh.addColorStop(1,'rgba(130,131,128,0)');
    ctx.fillStyle=sh;ctx.beginPath();ctx.ellipse(0,0,hl*0.8,sw*0.22,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    markDirty(p);
    const rH=Math.round(p.HW*0.084/1.2*0.8);
    let anyWet=false;
    for(const uv of uvs){
      const cx=Math.floor(uv.x*p.HW),cy=Math.floor((1-uv.y)*p.HH);
      for(let y=Math.max(0,cy-rH);y<Math.min(p.HH,cy+rH+1);y+=2)
        for(let x=Math.max(0,cx-rH);x<Math.min(p.HW,cx+rH+1);x+=2){
          const d=Math.sqrt((x-cx)**2+(y-cy)**2);if(d>rH)continue;
          const idx=y*p.HW+x;
          if(p.heightData[idx]<0.08)continue;
          const mn=p.heightData[idx]*0.55;
          p.heightData[idx]=Math.max(mn,p.heightData[idx]-(1-d/rH)*0.12);
          /* 均しは軽く艶を復活（磨いた感） */
          p.wetnessData[idx]=Math.min(1,p.wetnessData[idx]+0.20);
          anyWet=true;
        }

    renderHt(p);
    if(anyWet)renderRh(p);
  }

  /* ===== スコア計算 ===== */
  function computeScore(p){
    /* TARGET=5: 塗代5mm = 100点。max heightData=10 (10mm) まで盛れるが、5を超えると盛りすぎで減点。 */
    const TARGET=5.0,COV_TH=0.5;
    let covered=0,total=0,sum=0,sumSq=0,sumDev=0;
    for(let i=0;i<p.heightData.length;i+=2){
      total++;
      const h=p.heightData[i];
      if(h>COV_TH){covered++;sum+=h;sumSq+=h*h;sumDev+=Math.abs(h-TARGET);}
    }
    if(covered===0)return{uniformity:0,thickness:0,coverage:0,overall:0,avgH:0,covered:0};
    const avg=sum/covered;
    const variance=sumSq/covered-avg*avg;
    const stddev=Math.sqrt(Math.max(0,variance));
    const avgDev=sumDev/covered;
    const uniformity=Math.max(0,1-stddev/4);
    const thickness=Math.max(0,1-avgDev/5);
    const coverageScore=Math.min(1,covered/total*1.3);
    const overall=uniformity*0.40+thickness*0.35+coverageScore*0.25;
    return{uniformity,thickness,coverage:coverageScore,overall,avgH:avg,covered};
  }
  /* 段位 */
  function getRank(score){
    if(score<15) return{name:'入 門',sub:'まずは塗ってみよ',col:'#7a5a3a'};
    if(score<28) return{name:'修 行',sub:'手を動かせ',col:'#7a4a20'};
    if(score<42) return{name:'三 級',sub:'端まで届かせよ',col:'#6a3a15'};
    if(score<55) return{name:'二 級',sub:'厚みを意識せよ',col:'#5a2a08'};
    if(score<66) return{name:'一 級',sub:'もう一息',col:'#4a1a02'};
    if(score<75) return{name:'初 段',sub:'良き仕上がり',col:'#3a0a00'};
    if(score<83) return{name:'二 段',sub:'平らに仕上ぐ',col:'#2a0500'};
    if(score<90) return{name:'三 段',sub:'目を見張る出来',col:'#220300'};
    if(score<96) return{name:'師 範',sub:'匠の領域',col:'#a02000'};
    return       {name:'名 人',sub:'其の道を極めり',col:'#c02000'};
  }
  /* 和紙風背景 */
  function prepareWashi(){
    const cvs=document.getElementById('hudCvs');if(!cvs)return;
    washiBg=document.createElement('canvas');
    washiBg.width=cvs.width;washiBg.height=cvs.height;
    const ctx=washiBg.getContext('2d');
    const g=ctx.createLinearGradient(0,0,0,cvs.height);
    g.addColorStop(0,'#EFE3C4');g.addColorStop(0.5,'#E8DBB6');g.addColorStop(1,'#DECCA0');
    ctx.fillStyle=g;ctx.fillRect(0,0,cvs.width,cvs.height);
    for(let i=0;i<600;i++){
      const x=Math.random()*cvs.width,y=Math.random()*cvs.height,l=Math.random()*14+3;
      const a=Math.random()*Math.PI*2;
      ctx.strokeStyle=`rgba(${130+Math.random()*40|0},${90+Math.random()*30|0},${50+Math.random()*30|0},${0.05+Math.random()*0.10})`;
      ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+Math.cos(a)*l,y+Math.sin(a)*l);ctx.stroke();
    }
    for(let i=0;i<240;i++){
      ctx.fillStyle=`rgba(${110+Math.random()*40|0},${70+Math.random()*30|0},${30+Math.random()*30|0},${0.08+Math.random()*0.12})`;
      ctx.beginPath();ctx.arc(Math.random()*cvs.width,Math.random()*cvs.height,Math.random()*1.4+0.3,0,Math.PI*2);ctx.fill();
    }
    for(let i=0;i<4;i++){
      const x=Math.random()*cvs.width,y=Math.random()*cvs.height,r=30+Math.random()*60;
      const gr=ctx.createRadialGradient(x,y,0,x,y,r);
      gr.addColorStop(0,'rgba(140,90,40,0.10)');gr.addColorStop(1,'rgba(140,90,40,0)');
      ctx.fillStyle=gr;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    }
  }
  /* HUD 描画（道場・巻物風）
     XR 中 window.rAF が当てにならないので time-based throttle */
  let _hudLast=0;
  function requestHUD(){
    const now=performance.now();
    if(now-_hudLast<80)return;
    _hudLast=now;
    drawHUD();
  }
  function drawHUD(){
    const cvs=document.getElementById('hudCvs');if(!cvs)return;
    const ctx=cvs.getContext('2d');
    const W=cvs.width,H=cvs.height;
    if(washiBg)ctx.drawImage(washiBg,0,0);
    else{ctx.fillStyle='#EBE1C4';ctx.fillRect(0,0,W,H);}
    /* 巻物の上下軸 */
    ctx.fillStyle='#3a2308';
    ctx.fillRect(0,0,W,18);ctx.fillRect(0,H-18,W,18);
    ctx.fillStyle='rgba(255,200,120,0.25)';
    ctx.fillRect(0,4,W,3);ctx.fillRect(0,H-7,W,3);
    /* 内側罫線 */
    ctx.strokeStyle='rgba(110,70,30,0.5)';ctx.lineWidth=1.5;
    ctx.strokeRect(20,30,W-40,H-60);
    const sc=computeScore(painters[0]);
    const scoreVal=Math.floor(sc.overall*100);
    if(scoreVal>bestScore)bestScore=scoreVal;
    /* タイトル */
    ctx.fillStyle='#2a1505';
    ctx.font='bold 26px "Yu Mincho","Hiragino Mincho ProN","MS Mincho",serif';
    ctx.textAlign='center';ctx.textBaseline='alphabetic';
    ctx.fillText('施 工 評 定',W/2,62);
    ctx.strokeStyle='rgba(110,70,30,0.6)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(W*0.20,76);ctx.lineTo(W*0.80,76);ctx.stroke();
    /* 段位 */
    const rk=getRank(scoreVal);
    ctx.fillStyle=rk.col;
    ctx.font='bold 92px "Yu Mincho","Hiragino Mincho ProN","MS Mincho",serif';
    ctx.fillText(rk.name,W/2,180);
    /* 副題 */
    ctx.fillStyle='#5a2f10';
    ctx.font='20px "Yu Mincho","Hiragino Mincho ProN",serif';
    ctx.fillText('— '+rk.sub+' —',W/2,212);
    /* 点数 */
    ctx.fillStyle='#3a1a05';
    ctx.font='bold 40px "Yu Mincho","Hiragino Mincho ProN",serif';
    ctx.fillText(`${scoreVal}`,W/2-30,266);
    ctx.font='bold 22px "Yu Mincho","Hiragino Mincho ProN",serif';
    ctx.fillText('点',W/2+18,266);
    /* 細目 */
    drawDetail(ctx,'平 滑 度',sc.uniformity,W,316);
    drawDetail(ctx,'均 一 性',sc.thickness, W,354);
    drawDetail(ctx,'被 覆 率',sc.coverage,  W,392);
    /* 本日の最高 */
    ctx.fillStyle='#5a2f10';
    ctx.font='bold 18px "Yu Mincho","Hiragino Mincho ProN",serif';
    ctx.textAlign='center';
    ctx.fillText(`本日の最高  ${bestScore} 点`,W/2,434);
    /* 残量（数値を右寄せに揃える）*/
    ctx.strokeStyle='rgba(110,70,30,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(W*0.15,452);ctx.lineTo(W*0.85,452);ctx.stroke();
    ctx.fillStyle='#3a1a05';
    ctx.font='bold 16px "Yu Mincho","Hiragino Mincho ProN",serif';
    ctx.textAlign='left';
    ctx.fillText('鏝板',W*0.18,478);
    ctx.fillText('モルタル',W*0.18,500);
    ctx.textAlign='right';
    ctx.fillText(`${Math.floor(hawkMortar)} %`,W*0.82,478);
    ctx.fillText(`${Math.floor(trowelMortar/TMAX*100)} %`,W*0.82,500);
    /* ④ 角度指標（接触中のみ表示）*/
    if(window._contactActive){
      const deg=window._angleDeg||0;
      const factor=window._angleFactor||1.0;
      let label,col;
      if(factor>=0.95){label='良';col='#2a8a20';}
      else if(deg<10){label='浅い';col='#a06010';}
      else if(deg>25){label='立ち過ぎ';col='#a02020';}
      else{label='要調整';col='#a06010';}
      ctx.textAlign='left';ctx.fillStyle='#3a1a05';
      ctx.font='bold 15px "Yu Mincho","Hiragino Mincho ProN",serif';
      ctx.fillText('角度',W*0.18,522);
      ctx.textAlign='right';ctx.fillStyle=col;
      ctx.fillText(`${Math.round(deg)}° ${label}`,W*0.82,522);
    }
    /* メッセージ */
    if(hudMsg){
      ctx.fillStyle='#a02808';
      ctx.font='bold 20px "Yu Mincho","Hiragino Mincho ProN",serif';
      ctx.textAlign='center';
      ctx.fillText('〘 '+hudMsg+' 〙',W/2,540);
    }
    if(hudTex)hudTex.needsUpdate=true;
  }
  function drawDetail(ctx,label,val,W,y){
    val=Math.max(0,Math.min(1,val));
    const barX=W*0.45,barW=W*0.40,barH=8;
    ctx.fillStyle='#3a1a05';
    ctx.font='bold 18px "Yu Mincho","Hiragino Mincho ProN",serif';
    ctx.textAlign='left';ctx.fillText(label,W*0.13,y+5);
    ctx.fillStyle='rgba(180,150,100,0.55)';
    ctx.fillRect(barX,y-3,barW,barH);
    ctx.fillStyle='#7a4015';
    ctx.fillRect(barX,y-3,barW*val,barH);
    ctx.fillStyle='#3a1a05';
    ctx.font='bold 15px "Yu Mincho","Hiragino Mincho ProN",serif';
    ctx.textAlign='right';
    ctx.fillText(`${Math.floor(val*100)}`,W*0.87,y+5);
  }
  updMortar();
  </script>
