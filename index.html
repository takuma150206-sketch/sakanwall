<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>左官MR練習</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script>
  AFRAME.registerComponent('blade-shape',{
    init:function(){
      const hw=0.042,R=0.200,T=0.240,D=0.0025,bot=-T/2,rT=bot+R,tip=bot+T;
      const sh=new THREE.Shape();
      sh.moveTo(-hw,bot);sh.lineTo(hw,bot);sh.lineTo(hw,rT);sh.lineTo(0,tip);sh.lineTo(-hw,rT);sh.closePath();
      const geo=new THREE.ExtrudeGeometry(sh,{depth:D,bevelEnabled:false});
      geo.translate(0,0,-D/2);
      this.el.setObject3D('mesh',new THREE.Mesh(geo,
        new THREE.MeshStandardMaterial({color:0xc4c6ca,metalness:0.9,roughness:0.14,side:THREE.DoubleSide})));
    }
  });

  AFRAME.registerComponent('trowel',{
    init:function(){
      this.lt=0;this.wc=false;this.md=false;
      this.heq=null;this.hma=0;this.kgd=false;
      this.lp=new THREE.Vector3();this.spd=0;
      this.rc=new THREE.Raycaster();this.rc.far=0.08;
      const Y0=-0.085,Y1=+0.115,BZ=-0.042;
      this.bpts=[];
      for(let i=0;i<9;i++) this.bpts.push(new THREE.Vector3(0,Y0+i/8*(Y1-Y0),BZ));
      this._wp=new THREE.Vector3();this._fwd=new THREE.Vector3();
      this._tp=new THREE.Vector3();this._hp=new THREE.Vector3();this._bc=new THREE.Vector3();

      this.el.addEventListener('abuttondown',()=>{
        const o=this.el.object3D;if(!o)return;
        o.getWorldPosition(this._tp);
        document.getElementById('wall').setAttribute('position',{
          x:+this._tp.x.toFixed(3),y:1.3,z:+(this._tp.z-0.042).toFixed(3)});
        document.getElementById('heatWall').setAttribute('position',{
          x:+this._tp.x.toFixed(3)+1.5,y:1.3,z:+(this._tp.z-0.042).toFixed(3)});
        resetAll(); setMsg('壁を設置 ✓');
      });
      document.getElementById('leftHand').addEventListener('gripdown',()=>{
        hawkMortar=100;updMortar();setMsg('補充 🪣');
      });
      window.addEventListener('mousedown',()=>{this.md=true;});
      window.addEventListener('mouseup',  ()=>{this.md=false;});
    },
    tick:function(){
      const now=performance.now();
      if(now-this.lt<16)return;this.lt=now;
      const sc=document.querySelector('a-scene');
      const isXR=sc.is('vr-mode')||sc.is('ar-mode');
      const o=this.el.object3D;if(!o)return;
      const cp=new THREE.Vector3();o.getWorldPosition(cp);
      this.spd=cp.distanceTo(this.lp)*60*100;this.lp.copy(cp);
      if(isXR){try{const s=sc.renderer?.xr?.getSession?.();
        if(s?.inputSources)for(const src of s.inputSources)
          if(src.handedness==='right'&&src.gamepad?.hapticActuators?.length){window._rgp=src.gamepad;break;}
      }catch(e){}}
      const lh=document.getElementById('leftHand');
      if(lh?.object3D){
        this._hp.set(0,0.012,-0.15).applyMatrix4(lh.object3D.matrixWorld);
        this._bc.set(0,0.015,-0.042).applyMatrix4(o.matrixWorld);
        if(this._bc.distanceTo(this._hp)<0.22){
          if(!this.heq){this.heq=o.quaternion.clone();this.hma=0;if(hawkMortar>0)setMsg('手首をひねってコテ返し！');}
          this.hma=Math.max(this.hma,o.quaternion.angleTo(this.heq));
          if(this.hma>Math.PI*0.22&&hawkMortar>0){
            const amt=Math.min(50,hawkMortar);
            hawkMortar=Math.max(0,hawkMortar-amt);
            trowelMortar=Math.min(78,trowelMortar+amt);
            this.kgd=true;this.heq=null;this.hma=0;
            updMortar();setMsg('コテ返し ✓');haptic(0.55,150);snd.playKG();
          }
        }else{this.heq=null;this.hma=0;}
      }
      if(!isXR&&!this.md){lastUV=null;this.wc=false;return;}
      this._fwd.set(0,0,-1).transformDirection(o.matrixWorld);
      const wm=document.getElementById('wall').getObject3D('mesh');if(!wm)return;
      this._wp.copy(this.bpts[4]).applyMatrix4(o.matrixWorld);
      this.rc.set(this._wp,this._fwd);
      if(!this.rc.intersectObject(wm,true).length){
        if(this.wc)snd.stop();lastUV=null;this.wc=false;return;
      }
      const uvs=[];
      for(const lp of this.bpts){
        this._wp.copy(lp).applyMatrix4(o.matrixWorld);
        this.rc.set(this._wp,this._fwd);
        const h=this.rc.intersectObject(wm,true);
        if(h.length&&h[0].uv)uvs.push({x:h[0].uv.x,y:h[0].uv.y});
      }
      if(uvs.length<2){lastUV=null;this.wc=false;return;}
      if(!this.wc){haptic(0.65,55);snd.start(this.spd);this.wc=true;}
      else snd.upd(this.spd);
      if(trowelMortar<=0){smooth(uvs);haptic(0.08,20);}
      else{
        if(!this.kgd){setMsg('コテ返しで材料を取ってください');return;}
        paint(uvs);haptic(0.13,20);
      }
    }
  });
  </script>
  <style>
    body{margin:0;font-family:sans-serif;}
    #ui{position:fixed;top:8px;left:8px;background:rgba(0,0,0,0.6);color:#fff;
        padding:8px 12px;border-radius:8px;font-size:11px;line-height:1.5;z-index:100;max-width:220px;}
    #ver{position:fixed;top:8px;right:8px;background:rgba(0,0,0,0.5);color:#aaa;
         padding:3px 8px;border-radius:5px;font-size:10px;z-index:100;}
    #btn{position:fixed;bottom:16px;right:16px;padding:14px 28px;font-size:16px;
         background:#555;color:#fff;border:none;border-radius:8px;cursor:pointer;z-index:100;}
    #btn:hover:not(:disabled){background:#777;}#btn:disabled{background:#444;cursor:not-allowed;}
    #st{position:fixed;bottom:16px;left:16px;background:rgba(0,0,0,0.65);color:#fff;
        padding:5px 9px;border-radius:5px;font-size:10px;z-index:100;}
  </style>
</head>
<body>
  <div id="ver">v4.7</div>
  <div id="ui"><strong>左官MR練習</strong><br>Ⓐ 壁設置 / 左G 補充<br>鏝板+ひねり→コテ返し<br>材料あり→塗 / なし→均</div>
  <button id="btn" disabled>確認中...</button>
  <div id="st">確認中...</div>

  <a-scene background="transparent:true" vr-mode-ui="enabled:false"
           webxr="optionalFeatures:hit-test,local-floor;"
           renderer="colorManagement:true;antialias:false;alpha:true;">
    <a-assets>
      <canvas id="wCvs" width="128" height="128"></canvas>
      <canvas id="hCvs" width="32"  height="32"></canvas>
      <canvas id="htCvs" width="64" height="64"></canvas>
    </a-assets>

    <!-- 塗り壁 -->
    <a-entity id="wall"
      geometry="primitive:plane;width:1.2;height:1.0;segmentsWidth:24;segmentsHeight:24"
      material="src:#wCvs;shader:standard;roughness:0.95;metalness:0;"
      position="0 1.3 -0.7"></a-entity>

    <!-- 塗り厚マップ壁 (右隣) -->
    <a-entity id="heatWall"
      geometry="primitive:plane;width:1.2;height:1.0;segmentsWidth:1;segmentsHeight:1"
      material="src:#hCvs;shader:flat;"
      position="1.5 1.3 -0.7"></a-entity>
    <a-text value="塗り厚マップ" position="1.5 1.88 -0.7" align="center" color="#fff" width="1.8"></a-text>

    <!-- HUD -->
    <a-entity position="-0.95 1.80 -0.55" rotation="0 35 0">
      <a-plane width="0.65" height="0.42" color="#000" opacity="0.70"></a-plane>
      <a-text id="hCov" value="塗布率: 0%"       position="0  0.14 0.01" align="center" color="#9F9"    width="1.3"></a-text>
      <a-text id="hHwk" value="鏝板: 100%"       position="0  0.04 0.01" align="center" color="#FFD080" width="1.3"></a-text>
      <a-text id="hTrw" value="鏝の泥: 0%"       position="0 -0.06 0.01" align="center" color="#80DFFF" width="1.3"></a-text>
      <a-text id="hMsg" value=""                  position="0 -0.16 0.01" align="center" color="#FFD700" width="1.2" wrap-count="20"></a-text>
    </a-entity>

    <!-- ボタン -->
    <a-entity position="-0.95 1.44 -0.55" rotation="0 35 0">
      <a-box id="resetBtn" position="-0.15 0 0" width="0.24" height="0.10" depth="0.04" color="#a44"></a-box>
      <a-text value="リセット" position="-0.15 0 0.03" align="center" color="#fff" width="1.3"></a-text>
      <a-box id="gradeBtn" position="0.15 0 0"  width="0.24" height="0.10" depth="0.04" color="#4a4"></a-box>
      <a-text value="採点" position="0.15 0 0.03" align="center" color="#fff" width="1.3"></a-text>
    </a-entity>

    <!-- 右手 -->
    <a-entity id="rightHand" oculus-touch-controls="hand:right;model:false" trowel>
      <a-sphere position="0 -0.080 0" radius="0.018" color="#C4A068"></a-sphere>
      <a-cylinder position="0 -0.018 0" radius="0.015" height="0.125" color="#D8BC84"></a-cylinder>
      <a-cylinder position="0 0 -0.020" radius="0.007" height="0.040" rotation="90 0 0" color="#888"></a-cylinder>
      <a-entity blade-shape position="0 0.035 -0.042"></a-entity>
      <a-box id="tMV" position="0 0.035 -0.046" width="0.080" height="0.198" depth="0.006" color="#828278"
             material="roughness:0.9;metalness:0;opacity:0;transparent:true;"></a-box>
    </a-entity>

    <!-- 左手 -->
    <a-entity id="leftHand" laser-controls="hand:left"
              raycaster="objects:#resetBtn,#gradeBtn;far:3;lineColor:#fff;lineOpacity:0.4">
      <a-box position="0 0.005 -0.15" width="0.28" height="0.007" depth="0.28" color="#A08860"></a-box>
      <a-cylinder position="0 -0.06 -0.15" radius="0.015" height="0.11" color="#6B4226"></a-cylinder>
      <a-sphere id="hMV" position="0 0.020 -0.15" scale="0.20 0.04 0.20" color="#828278"></a-sphere>
    </a-entity>

    <a-light type="ambient" intensity="0.70"></a-light>
    <a-light type="directional" intensity="0.85" position="1 2 1"></a-light>
  </a-scene>

  <script>
  /* WebXR */
  const stEl=document.getElementById('st'),btnEl=document.getElementById('btn'),sc=document.querySelector('a-scene');
  let arOK=false;
  (async()=>{
    if(!navigator.xr){stEl.textContent='✗ 非対応';return;}
    try{
      arOK=await navigator.xr.isSessionSupported('immersive-ar');
      const vr=await navigator.xr.isSessionSupported('immersive-vr');
      if(arOK){stEl.textContent='✓ AR';btnEl.textContent='Enter AR';btnEl.disabled=false;}
      else if(vr){stEl.textContent='⚠ VR';btnEl.textContent='Enter VR';btnEl.disabled=false;}
    }catch(e){}
  })();
  btnEl.addEventListener('click',()=>{snd.init();arOK?sc.enterAR():sc.enterVR();});
  const UI=['btn','st','ui','ver'];
  sc.addEventListener('enter-vr',()=>UI.forEach(id=>document.getElementById(id).style.display='none'));
  sc.addEventListener('exit-vr', ()=>UI.forEach(id=>document.getElementById(id).style.display='block'));

  /* ハプティクス */
  window._rgp=null;
  function haptic(i,ms){try{window._rgp?.hapticActuators?.[0]?.pulse(i,ms);}catch(e){}}

  /* モルタル */
  let hawkMortar=100,trowelMortar=0,lastUV=null;
  const TMAX=60,PCOST=0.35;
  function updMortar(){
    const hv=document.getElementById('hMV');
    if(hv){const r=Math.max(0.01,hawkMortar/100);hv.setAttribute('scale',`${r*0.2} ${r*0.04} ${r*0.2}`);}
    const tv=document.getElementById('tMV');
    if(tv){const r=trowelMortar/TMAX;tv.setAttribute('material',`color:#828278;roughness:0.9;metalness:0;opacity:${(r*0.9).toFixed(2)};transparent:true`);}
    document.getElementById('hHwk').setAttribute('value',`鏝板: ${Math.floor(hawkMortar)}%`);
    document.getElementById('hTrw').setAttribute('value',`鏝の泥: ${Math.floor(trowelMortar/TMAX*100)}%`);
  }
  let msgT=null;
  function setMsg(m){document.getElementById('hMsg').setAttribute('value',m);clearTimeout(msgT);msgT=setTimeout(()=>document.getElementById('hMsg').setAttribute('value',''),4000);}

  /* サウンド */
  const snd={ctx:null,nb:null,nd:null,gn:null,fn:null,
    init(){if(this.ctx)return;try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      const sr=this.ctx.sampleRate,b=this.ctx.createBuffer(1,sr,sr),d=b.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;this.nb=b;}catch(e){}},
    start(spd){if(!this.ctx||!this.nb)return;this.stop();
      const s=this.ctx.createBufferSource();s.buffer=this.nb;s.loop=true;
      this.fn=this.ctx.createBiquadFilter();this.fn.type='bandpass';
      this.fn.frequency.value=200+Math.min(spd,20)*80;this.fn.Q.value=4;
      this.gn=this.ctx.createGain();this.gn.gain.setValueAtTime(0,this.ctx.currentTime);
      this.gn.gain.linearRampToValueAtTime(0.10,this.ctx.currentTime+0.05);
      s.connect(this.fn);this.fn.connect(this.gn);this.gn.connect(this.ctx.destination);
      s.start();this.nd=s;},
    upd(spd){if(!this.fn)return;this.fn.frequency.setTargetAtTime(200+Math.min(spd,20)*80,this.ctx.currentTime,0.06);},
    stop(){if(!this.nd)return;try{this.gn.gain.setTargetAtTime(0,this.ctx.currentTime,0.04);
      const n=this.nd;setTimeout(()=>{try{n.stop();}catch(e){}},200);}catch(e){}this.nd=this.gn=this.fn=null;},
    playKG(){if(!this.ctx||!this.nb)return;
      const s=this.ctx.createBufferSource();s.buffer=this.nb;
      const f=this.ctx.createBiquadFilter();f.type='lowpass';
      f.frequency.setValueAtTime(600,this.ctx.currentTime);
      f.frequency.exponentialRampToValueAtTime(80,this.ctx.currentTime+0.22);
      const g=this.ctx.createGain();g.gain.setValueAtTime(0.6,this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+0.30);
      s.connect(f);f.connect(g);g.connect(this.ctx.destination);s.start();s.stop(this.ctx.currentTime+0.32);}
  };

  /* Canvas */
  const W=128,H=128,HW=32,HH=32; // 最小解像度
  const wCvs=document.getElementById('wCvs'),wCtx=wCvs.getContext('2d');
  const hCvs=document.getElementById('hCvs'),hCtx2=hCvs.getContext('2d');
  const htCvs=document.getElementById('htCvs'),htCtx=htCvs.getContext('2d');
  let colorTex=null,heightTex=null,heatTex=null;
  let heightData=new Float32Array(HW*HH);
  let thickMap=new Uint8Array(W*H);

  function drawBase(){
    wCtx.fillStyle='#B8B4AE';wCtx.fillRect(0,0,W,H);
    for(let i=0;i<300;i++){
      const x=Math.random()*W,y=Math.random()*H,r=Math.random()*2.5+0.5;
      const v=Math.floor(140+Math.random()*55);
      wCtx.fillStyle=`rgba(${v},${v-3},${v-6},${0.2+Math.random()*0.3})`;
      wCtx.beginPath();wCtx.arc(x,y,r,0,Math.PI*2);wCtx.fill();
    }
    if(colorTex)colorTex.needsUpdate=true;
  }

  function resetAll(){
    thickMap=new Uint8Array(W*H);heightData=new Float32Array(HW*HH);lastUV=null;
    drawBase();
    htCtx.fillStyle='#000';htCtx.fillRect(0,0,HW,HH);
    if(heightTex)heightTex.needsUpdate=true;
    // ヒートマップも初期化
    hCtx2.fillStyle='#B4B0AA';hCtx2.fillRect(0,0,HW,HH);
    if(heatTex)heatTex.needsUpdate=true;
    updCov();
  }

  sc.addEventListener('loaded',()=>{
    const wm=document.getElementById('wall').getObject3D('mesh');
    if(wm){
      colorTex=new THREE.CanvasTexture(wCvs);wm.material.map=colorTex;
      heightTex=new THREE.CanvasTexture(htCvs);
      wm.material.displacementMap=heightTex;wm.material.displacementScale=0.014;
      wm.material.needsUpdate=true;
    }
    const hm=document.getElementById('heatWall').getObject3D('mesh');
    if(hm){heatTex=new THREE.CanvasTexture(hCvs);hm.material.map=heatTex;hm.material.needsUpdate=true;}
    drawBase();
    hCtx2.fillStyle='#B4B0AA';hCtx2.fillRect(0,0,HW,HH);
  });

  /* 塗り厚マップ更新 (32×32 = 1024ピクセルのみ) */
  const HMIN=1.5,HMAX=5.0,HFAT=9.0;
  function updHeat(){
    const img=hCtx2.createImageData(HW,HH),d=img.data;
    for(let i=0;i<HW*HH;i++){
      const h=heightData[i];
      let r,g,b;
      if(h<0.08){r=180;g=178;b=174;}
      else if(h<HMIN){const t=h/HMIN;r=30;g=80+Math.floor(90*t);b=230;}
      else if(h<=HMAX){const t=(h-HMIN)/(HMAX-HMIN);r=30+Math.floor(70*t);g=210;b=40;}
      else if(h<=HFAT){const t=(h-HMAX)/(HFAT-HMAX);r=225+Math.floor(30*t);g=Math.floor(180*(1-t*0.6));b=10;}
      else{r=255;g=15;b=10;}
      d[i*4]=r;d[i*4+1]=g;d[i*4+2]=b;d[i*4+3]=255;
    }
    hCtx2.putImageData(img,0,0);
    if(heatTex)heatTex.needsUpdate=true;
  }

  /* 塗り */
  const MR=82,MG=80,MB=75;
  function paint(uvs){
    if(uvs.length<2||trowelMortar<=0)return;
    const pts=uvs.map(u=>({x:u.x*W,y:(1-u.y)*H}));
    const mid=pts[Math.floor(pts.length/2)],muv=uvs[Math.floor(uvs.length/2)];
    const f=pts[0],l=pts[pts.length-1];
    const bdx=l.x-f.x,bdy=l.y-f.y,ba=Math.atan2(bdy,bdx),hl=Math.sqrt(bdx*bdx+bdy*bdy)/2;
    let spd=0;
    if(lastUV){const dx=(muv.x-lastUV.x)*W,dy=-(muv.y-lastUV.y)*H;spd=Math.sqrt(dx*dx+dy*dy);}
    lastUV={x:muv.x,y:muv.y};
    const sf=(0.3+Math.random()*0.7)*(1-Math.max(0,Math.min(1,spd/18))*0.5);
    const sw=24+Math.min(spd*1.0,14);
    const it=Math.min(1,trowelMortar/(TMAX*0.25));
    const cr=Math.round(MR-sf*16),cg=Math.round(MG-sf*14),cb=Math.round(MB-sf*12);
    for(const p of pts){
      const a=(0.75*it*sf).toFixed(2);
      const g=wCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,sw);
      g.addColorStop(0,`rgba(${cr},${cg},${cb},${a})`);
      g.addColorStop(0.7,`rgba(${cr+8},${cg+6},${cb+4},${(a*0.5).toFixed(2)})`);
      g.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
      wCtx.fillStyle=g;wCtx.beginPath();wCtx.arc(p.x,p.y,sw,0,Math.PI*2);wCtx.fill();
    }
    // 鏝跡ライン
    wCtx.save();wCtx.translate(mid.x,mid.y);wCtx.rotate(ba);
    wCtx.strokeStyle=`rgba(${MR+22},${MG+20},${MB+18},${(0.4*it*sf).toFixed(2)})`;
    wCtx.lineWidth=1.0;
    [-1,1].forEach(s=>{wCtx.beginPath();wCtx.moveTo(-hl*0.9,s*sw*0.8);wCtx.lineTo(hl*0.9,s*sw*0.8);wCtx.stroke();});
    // 鏝波 (軽量版: 5本のみ)
    const spacing=10,num=Math.ceil(sw*2/spacing);
    for(let i=-Math.floor(num/2);i<=Math.floor(num/2);i++){
      const yo=i*spacing,ef=1-Math.abs(yo)/(sw*1.1);if(ef<=0)continue;
      const amp=3.0*Math.pow(ef,0.6),al=(0.30*ef*it).toFixed(3);
      wCtx.strokeStyle=`rgba(${i%2===0?52:172},${i%2===0?49:166},${i%2===0?43:158},${al})`;
      wCtx.lineWidth=0.6+1.2*ef;
      wCtx.beginPath();
      const steps=8,blen=hl*2;
      for(let s=0;s<=steps;s++){
        const x=-hl+s*(blen/steps),w=Math.sin(x*0.06+i)*amp;
        s===0?wCtx.moveTo(x,yo+w):wCtx.lineTo(x,yo+w);
      }
      wCtx.stroke();
    }
    wCtx.restore();
    // 粒感: 12粒
    for(let i=0;i<12;i++){
      const p2=pts[Math.floor(Math.random()*pts.length)];
      const gx=p2.x+(Math.random()-0.5)*sw*2,gy=p2.y+(Math.random()-0.5)*sw*2;
      const v=Math.floor(65+Math.random()*35);
      wCtx.fillStyle=`rgba(${v},${v-2},${v-4},${(0.3+Math.random()*0.4).toFixed(2)})`;
      wCtx.beginPath();wCtx.arc(gx,gy,Math.random()*2+0.5,0,Math.PI*2);wCtx.fill();
    }
    if(colorTex)colorTex.needsUpdate=true;
    // ハイト (4px間引き)
    const r=Math.round(HW*0.084/1.2*0.65);
    for(const uv of uvs){
      const cx=Math.floor(uv.x*HW),cy=Math.floor((1-uv.y)*HH);
      for(let y=Math.max(0,cy-r);y<Math.min(HH,cy+r+1);y+=3)
        for(let x=Math.max(0,cx-r);x<Math.min(HW,cx+r+1);x+=3){
          const d=Math.sqrt((x-cx)**2+(y-cy)**2);if(d>r)continue;
          const ef=d<r*0.75?1:1-(d-r*0.75)/(r*0.25);
          heightData[y*HW+x]+=ef*sf*0.55;
        }
    }
    const hi=htCtx.createImageData(HW,HH),hd=hi.data;
    for(let i=0;i<heightData.length;i++){const v=Math.min(255,Math.floor(Math.max(0,heightData[i])/10*255));hd[i*4]=hd[i*4+1]=hd[i*4+2]=v;hd[i*4+3]=255;}
    htCtx.putImageData(hi,0,0);if(heightTex)heightTex.needsUpdate=true;
    // ヒートマップ更新
    updHeat();
    trowelMortar=Math.max(0,trowelMortar-PCOST);
    if(trowelMortar===0)setMsg('泥切れ。コテ返しを');
    updMortar();updCov();
  }

  /* 均し */
  function smooth(uvs){
    if(uvs.length<2)return;
    const pts=uvs.map(u=>({x:u.x*W,y:(1-u.y)*H}));
    const sw=32;
    for(const p of pts){
      const g=wCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,sw);
      g.addColorStop(0,'rgba(100,101,98,0.65)');g.addColorStop(0.5,'rgba(95,96,93,0.40)');g.addColorStop(1,'rgba(90,91,88,0)');
      wCtx.fillStyle=g;wCtx.beginPath();wCtx.arc(p.x,p.y,sw,0,Math.PI*2);wCtx.fill();
    }
    if(colorTex)colorTex.needsUpdate=true;
    const r=Math.round(HW*0.084/1.2*0.8);
    for(const uv of uvs){
      const cx=Math.floor(uv.x*HW),cy=Math.floor((1-uv.y)*HH);
      for(let y=Math.max(0,cy-r);y<Math.min(HH,cy+r+1);y+=3)
        for(let x=Math.max(0,cx-r);x<Math.min(HW,cx+r+1);x+=3){
          const d=Math.sqrt((x-cx)**2+(y-cy)**2);if(d>r)continue;
          const idx=y*HW+x,mn=heightData[idx]*0.55;
          heightData[idx]=Math.max(mn,heightData[idx]-(1-d/r)*0.12);
        }
    }
    const hi=htCtx.createImageData(HW,HH),hd=hi.data;
    for(let i=0;i<heightData.length;i++){const v=Math.min(255,Math.floor(Math.max(0,heightData[i])/10*255));hd[i*4]=hd[i*4+1]=hd[i*4+2]=v;hd[i*4+3]=255;}
    htCtx.putImageData(hi,0,0);if(heightTex)heightTex.needsUpdate=true;
    updHeat();
  }

  function updCov(){
    let p=0;for(let i=0;i<thickMap.length;i++)if(thickMap[i]>0)p++;
    document.getElementById('hCov').setAttribute('value',`塗布率: ${(p/thickMap.length*100).toFixed(0)}%`);
  }

  document.getElementById('resetBtn').addEventListener('click',()=>{resetAll();setMsg('リセット');});
  document.getElementById('gradeBtn').addEventListener('click',()=>{
    let p=0,ok=0,total=HW*HH;
    for(let i=0;i<total;i++){const h=heightData[i];if(h>0.08)p++;if(h>=HMIN&&h<=HMAX)ok++;}
    const cov=(p/total*100).toFixed(0),uni=p>0?(ok/p*100).toFixed(0):0;
    const sc2=Math.round(p/total*ok/Math.max(p,1)*100);
    const lb=sc2>=80?'◎優秀':sc2>=60?'○良好':sc2>=40?'△要改善':'✕要やり直し';
    setMsg(`塗布 ${cov}% / 適正 ${uni}% / ${lb}`);
  });

  updMortar();
  </script>
